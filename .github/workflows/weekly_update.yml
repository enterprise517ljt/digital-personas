name: Weekly Persona Update

on:
  schedule:
    # 每周一早上 8 点（北京时间）自动运行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      slug:
        description: '角色 slug (yongge 或 ququ)'
        required: true
        default: 'yongge'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run incremental update
        run: |
          python3 scripts/upgrader/incremental_updater.py \
            --slug ${{ github.event.inputs.slug || 'yongge' }} \
            --base-dir ./personas \
            --auto-merge

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "ci: weekly update $(date +%Y%m%d)"
          git push
